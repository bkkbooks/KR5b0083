front:
  text: 太上洞玄靈寶救苦妙經序夫學長生久視之道在乎鍊炁養神兼施並行然鍊養之功本乎一心心能勤修則學仙何患乎不得眞誥曰仙者心學奧哉斯旨也僕夙慕修眞未逢上士有果能明生死達性命者僕將跪履而問焉比遊武夷西湖與四明吕君邂逅一見驩然遂定交爲煙蘿友因俱載以歸館於靜舍吕君號洞陽子蚤遇至人刻意莊老之學博極仙書問靡不知一日謂愚曰世有所謂救苦經者實大洞之宻旨上道之秘言也以其隱奥玄微難窮妙理所以傳自往古而詮註未彰思欲殫所藴發揮其義未幾書成滔滔萬言首明一點指慶雲祥煙爲太和辯生門死戸爲玄牝分二炁之清濁判三昧之火符以泥丸仙明眞性之所歸還上天炁爲命寶之所集總談上道之樞要粲然包括其中不惟警未聞裨後學而已抑亦使人洞明修鍊默識天機豈架空言衒虛文之比哉噫此經之妙道至言晦久而未明今日顯矣夫天中之尊演教法弘濟所謂救苦者非獨爲幽魂苦爽而設其所救者普天之下生靈耳蓋欲使人人體道咸離迷途湛壺天之朗徹悟眞性之無爲然後服天氣盜虛无結聖胎通神明使形與神妙白日飛昇是謂大丈夫越世表出三界輪迴之難始名真救苦耳大矣哉超死度生無出是經有遇斯解留神不捨者必見其得道矣錦江葆真子周凖謹序重刋道藏輯要太上洞玄靈寶天尊說救苦妙經
