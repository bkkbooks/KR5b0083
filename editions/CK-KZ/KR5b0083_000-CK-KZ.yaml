body:
  text: 通神庵洞陽子註解太上太者至大之稱上者尊崇之號以其始乎太初太易之上故曰太上夫太易者未見炁也元始之初炁未之見也太易變而爲太初太初者炁之始也先天元炁始見微芒太初變而爲太始太始者形之始也漸有元炁之形矣太始變而爲太素太素者質之始也元炁之形質具矣太素變而爲太極太極者混沌也溟涬鴻濛狀如雞子其中有精彌綸無外元炁凝而清濁未分也太極旣變則混沌開而鴻濛裂於是清陽之炁昇而爲天濁陰之炁降而爲地易曰太極生兩儀是也兩儀生三才卽非濁非清中和之炁結而成人倫也是謂道生一一炁之混沌也一生二二儀之清濁也二生三三才之人倫也然後三生萬物萬物始之於天地天地不能自有有天地者太極也太極不能自生生太極者太素也太素不能自育育太素者太始也太始不能自孕孕太始者太初也未有太初先有太易夫太上者謂始乎太初太易之上是無大之大故曰太高出乎八極之表故曰上也又太者甚也上者高也言是經妙義甚高則無以過矣昔者聖人製此太字其文從人從一從一點者蓋人得一謂之大大人能卓然獨存常正此一點者可與大上全體也此一點亘古亘今不生不滅在道則謂之元神在儒則謂之真性在釋則謂之本來在眼能視在耳能聽在鼻能嗅在舌能嘗在手能執持在足能步履以致語黙動靜千轉萬變未嘗不因此一㸃而通靈也是以老君之鍊養養此一點而已莊周之寓言言此一點而已周公之仰思思此一點而已孔子之潛心潛此一點而已如來之大覺覺此一點而已祖師之相傳傳此一點而已百姓日用而不知外爲聲色所蕩内爲嗜欲所汨晝隨情愛夜遂夢飛念想攀緣未嘗暫息此一點不正心影常偏爲情慾誘之使出於外故成大字以言乎流浪輪轉或爲畜類也夫上字之文從卜從一卜度也一性也卜爾之一性能謙遜居下者則爲上士矣江海以下百谷則爲百谷王小國以下大國則取大國此孔子所以下漁父也夫下人不精不得其真井雖千仞汲之水上是以聖人不降則不昇故曰貴以賤爲本高以下爲基是知未常先人而常隨人後其身而身先者謙尊而光此眞人應世之道也故曰卜爾之一居下則爲上士其理昭然卜爾之一性若乃自矜自伐自是自彰而好居人上者斯則下人矣若夫體合太虛廓然無我所爲一點者内外俱忘上下雙遺斯則至聖之道可謂自已三清何勞仰望自己太上何勞外求也洞玄洞者通也上通於天下通於地中有神仙幽相往來天下十大洞三十六小洞居乎太虗磅礴之中莫不洞洞相通惟仙聖聚則成形散則爲氣自然往來虛通而無窒礙是以聖人遠取諸物近取諸身則人一身之中亦有洞者頭有九宫上有寥天共爲十大洞天柱骨二十四節共十二重樓共三十六洞上通泥丸之九天下徹尾閭之九地中有眞炁幽相往來是以聖人於虛極靜篤之中斡轉璇璣神通炁洞上與天通所謂三宫昇降上下往來無窮者也且洞之一字從水從同卽是洞與水同也夫巨海之水八紘九野天漢之流酌焉而不竭注焉而不滿渺渺漫漫無垠無際不可得而測其淵深也故造道者皆自麤至細自細至㣲㣲極而後至於妙妙極而後至於玄道之玄則無乎不通矣故洞也者以其幽深而不可測也玄也者以其微妙而不可窮也言是奧旨遠邈深如洞玄非玉虗之夙挺其孰能通之哉靈寶天尊說救苦妙經靈寶天尊卽太上道君也以身言之靈者神也寶者炁也形者靈寶之宅舍也夫人有耳目乃元神之門晝則心寤神遊於耳夜而目寐則神歸絳宫眾人視聽於外則神遊於外見聞聲色動蕩乎中神性化而爲情情受牽纏故心有念動有著晝有想夜有夢薾然馳逐馳逐於無涯之欲百靈疲役而消散宅舍無寶而崩頺此皆用神於外而不能守之於内者也若夫至人萬法俱忘惟神是守目内視而神光煥於玉闕耳返聽而妙韻響於瓊房神宇泰定一念不生智恬交養久而通靈上際於天下蟠於地六通四闢妙用無窮造化莫移陰陽莫測故能駕景乘颷登眞合道莫不由於神性者也得不謂之靈乎夫人有鼻口乃命寶出入之戸息息通於天地元氣之所往來凡一呼則穀炁出一吸則元炁入不死之機長生之要實隱於此矣眾人心靈外馳情躁炁促息之以喉胎元蕩散眞炁凋零炁竭命終可不惜哉惟至人深達造化之源呼吸太和之炁奪本還元歸根復命息之以踵寶莫寶於炁達斯理者泥丸玉闕所以棲其神玄門牝戸所以襲其炁炁以制神神以攝炁母子相守性命混融然後萬神不散故能靈一炁凝結則成寶是謂一身之靈寶也夫眾生之苦莫大於輪迴生死天尊大慈演說洞妙開滯塞之門指光明之路解悟之者得脫生死永免輪迴故曰救苦也經者徑也常也欲令上學之人依此徑路常行之也爾時救苦天尊天尊則元炁是也法身無相積炁成眞爲天中之尊聚則成形散復爲炁徧滿十方界元炁大無不包細無不入在谷滿谷在坑滿坑彌滿八極無往不在故曰徧滿十方界常以威神力救㧞諸眾生夫威神力莫大於元炁元炁之運獨秉造化之權眾生者所謂胎卵濕化之四生至於花卉草木禽獸魚𪔀蠕飛蠢動有情無情皆含育元炁而生故元炁在則柔弱滋養而生元炁去則堅強枯槁而死老子曰柔弱者生之徒堅强者死之徒凡有貌象聲色者皆物也悉得元炁而後生故曰救㧞諸眾生得離於迷途眾生不知覺如盲見日月眾生躭染聲色嗜慾困於迷途之中殊不知魚在水中水在魚中人在炁中炁在人中魚失水死人失炁亡吞舟之魚碭而失水則蟻能苦之故曰魚不可脫於淵人不可離於炁魚能吐納而化水則不死人能吐納而化炁則長生舉世但知日食穀肉果菜以養命而不知榖肉果菜乃戮形之物也夫有故以其有形者屬於陰乃土地之精也惟元炁乃屬陽且人一呼則炁出三寸一吸則炁入三寸一呼一吸爲一息一日一夜一萬三千五百息眞炁計八百一十丈昇降於鼻口呼吸之間凡夫不能掌握皆歸空而散則一息不返人命卒矣此經有養炁留神不死之訣世愚不達其旨譬如盲者雖有日月之大明莫能見之故曰如盲見日月我本太无中拔領無邊際元炁在太空虛无之中其猶槖籥噏張不息以其無有能入於無間故曰有而無形無而有精失之則死得之則生亘古通今得道昇仙者莫計其數皆得冲炁以爲用始成眞故曰㧞領无邊際慶雲開生門祥煙塞死戸一經之眼目救苦之樞機在於此也慶雲祥煙乃太和妙炁之異名生門死戸乃玄門牝戸之別號或曰天門地戸或曰乾坤門戸凡言門戸者必有物從兹而出入也開者闢也闔者塞也易曰闔戸謂之坤闢戸謂之乾一闔一闢謂之變往來不窮謂之通天地所以能長且久者以此也人欲長生久視與天地齊其年當於生門死戸之中窮通塞之端究造化之妙使通天地陰陽二炁往來昇降之不窮謂之出日入月亦曰出清入玄也不遇至人所指非碩學之所能聞以其性須自悟命假師傳也僕曩承師旨决以淵微輙將太上不泄眞機顯露聖訣學者宜精究之訣曰生門死戸兮千般異呼一曰朱淵兮一曰神廬下士不達兮鼻吸口吐上仙樞要兮萬類莫如慶雲祥煙兮旣昇且降開通充塞兮雲英紫腴採集素英兮飛空之景炁來入身兮味勝醍醐像龜引息兮通靈不死效蚌吸月兮涵養結珠天機斯泄兮遇者祕密功成輕舉兮駕馭瓊輿初發玄元始以通祥感機大道始初發生乎一炁一炁初爲玄元始三炁故曰初發玄元始三炁結而爲三清三色混沌煥爛太空三炁復各生三炁疊三成九卽成九霄而爲九天也生神章云須延總三靈玄元始炁分黃庭經所謂三炁右迥九道明又曰九炁映明出霄間卽是三炁爲天地之尊九炁爲萬物之根人能採鍊玄元始三素之炁通感祥煙慶雲之際是謂得造化之樞機故言以通祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精一切罪莫大於死罪一切厄莫大於死厄人死雖有萬殊總歸三路聖人死之曰神賢人死之曰復眾人死之曰物何謂聖人死之曰神聖人養聖胎於神室身内生身陽神脫質死而不亡脫胎神化者謂之神仙也何謂賢人死之曰復賢人在世不與物交性無所著以生爲寄以死爲歸歸者復也精神入其門骨骸返其根我尙何存蓋能虛諸所有而神識靈明出乎物外輪迴不入陰官莫拘翛然自在雖南面王樂亦不及也明心達性賢人君子禪伯之流超證眞常永無係累稍或見地未明修爲有缺著於談空滯於觀想終則謂之陰靈苦爽鬼仙是也或欲出世則能奪舍投胎何謂眾人死之曰物眾人在世魂夢念想常與物交不能外物安出物外故命將絶時形神不能相離如生龜脫殻螃蠏入湯疼痛苦楚萬狀千般旣死之後境界黑暗猶如夜半之禽飛懵然妄投不知所歸何地任造物之陶鑄隨業識以受生或化異類而不自覺蓋心之所化而不得不化也亦猶至暴者化爲猛虎至淫者化爲婦人或爲傍生六畜禽蟲之類及再得爲人皆謂之物也故曰眾人死之曰物若人臨終之時諸處俱冷惟頂門尙自温暖者此人得道徑歸浄域諸處俱冷心頭尙温再得爲人身不慕修道惶惶汲汲奔逐利名沉滯聲色日復一日如牽牛羊赴於屠肆步行一步去死轉近未死之前可不速求至道勤而行之成眞度世求免生死之罪厄故曰救一切罪度一切厄道成則名刋金籙位列仙卿玉女麾幢仙童皷節逍遥上清上上渺渺大羅之鄕諸天梵炁蕩蕩至清故曰渺渺超仙源蕩蕩自然清佩符則千魔喪膽流金則萬精滅形故曰皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙空彼萬法而妙用在中故曰空中內景煥爛返視獨見故曰何灼灼泥丸在兩眉間直入三寸爲腦血之瓊房魂精之玉室百靈之命宅津液之山源一名上一赤子乃形軀之上神故曰泥丸仙紫雲覆黃老金木之炁青白交會則化碧霞水火之炁黑赤旣濟則化紫雲夫受鍊形質莫先於眞水眞火也眞水非涕唾津液谷炁所變化之濁水在乎採太和妙炁之中自有眞一之水謂之玄泉要當明其水源之清濁也火本無形因物而生用無法則禍發必克仙家行火亦有數等用之則滅屍鍊魄體變純陽則有符數契合周天日月之躔度皆口口相傳難書竹帛仙彥有之曰神仙祕易不祕難聖人傳藥不傳火夫行水不行火則氣難上騰行火不行水則不能薰蒸是以水火旣濟而氳氲炁乃化爲紫雲神聚處氣必朝之故紫雲蓊鬰上朝於泥丸覆蓋於中央黃老君故曰紫雲覆黃老是名三寶君三寶君者因神炁精凝化而有也神有陰陽炁有清濁精有逆順何謂神有陰陽若因存思念想而後通靈者亦能出入天門預知未然謂之陰神也若夫積陰陽之炁結而成祥身内生身胎仙舞蛻者是謂陽神也陽神爲仙陰神爲鬼也何謂炁有清濁天有形質含血氣者穀肉果菜之類滋地根而生長其字從无從火是謂谷氣亦名地氣故曰濁也夫太和妙炁生天生地神鬼神帝强名爲道卽炁也炁卽道也視之不見聽之不聞摶之不得無形之形無物之象透金貫石充塞八荒其字從无從火火陽也乃虛旡之中清陽之炁也積陰炁者則死服陽炁者則生何謂精有逆順順則成人逆爲丹母斯皆行火而有昇降也凡夫婦之接名爲劫火亦通三關而透尾閭故順出則成人若乃提縮金龜是謂文火閉息而行是謂武火契合日月謂之符火故仙人道士開金鎻徹玉關運璇璣斡日月金精貫頂銀浪衝天是謂泝流故曰逆爲丹母也順則形斃逆則骨堅也夫人有眼目者乃神之門鼻口者炁之戸尾閭者精之路神徼妙用天眞聖功盡隱於此矣於是至人内視返聽凝其神呼吸太和襲其炁逆運流珠聚其精三寶凝積於神室之内皆化爲神故曰是名三寶君還將上天炁以制九天魂人頭有九天亦曰天谷魂神居之黃庭所謂上有魂靈下關元是也形好食味神好食炁天炁乃陽神之飯食也生神章云魂生攝遊炁飄飄鍊素華夫言遊炁者乃上天炁也魂神所攝者蓋好食炁而故以上天之炁制於九天魂也神不得一炁以制之則不能靈谷不得一炁以充之則不能盈神無以靈而將恐歇而神去於身矣谷無以盈將恐竭而天谷空虛矣谷神旣逝則人命終矣昔之未遇元炁蕩蕩而去今旣明眞去而有所復來故曰大還也還將上天之炁以制九天魂神始得其谷神不死故謂神得一而靈谷得一而盈救苦諸妙神善見救苦時天上混无分夫修上道要在全神神全之士光而不耀䝉以養正故能復太朴抱虛恬混成獨立一性遊乎寂寞靜極之境不萌纎芥之知故其神不離不起毫釐之念故其神不散䝉莊曰其天守全其神不卻守其天者神光纒綿化生萬神故曰諸妙神也凡言救苦者自救之也苦不自救孰能救之我道將成則大浸稽天而不溺大旱山焦而不𤍠死生無變於己而况大數大劫之死乎超越厄難之外故曰善見救苦時也所謂迴風混合帝一之道一混百神於自己天上而不可分故曰天上混无分天炁歸一身皆成自然人夫天炁者起於太易之先超乎萬象之外應清明以出入佇神機以卷舒澄清碧於髙天淡輕紅於落日不干風兩不犯塵埃呼吸玄牝之門澡雪希夷之域止飢渴除滓穢去三尸消百病此乃清虛有道之炁也玉皇神用祕訣曰知至道者天不殺服元炁者地不滅能明吐納之理即使日霞日精月華月英三素五芽元皇正炁來合我身此皆天炁也太和入體則骨肉輕清項生圓象隱顯自然始能爲自然人也故曰天炁歸一身皆成自然人如起於不潔之地因於燥濕之處雜腥穢之飲饌混屍塚之蒸鬱斯乃濁惡沉滯之死炁仙道忌焉所以仙人多樓居者以其近天炁也黃庭經云至忌死炁諸穢賤自然有别體本在空洞中空洞迹非迹徧體皆虛空老子曰天法道道法自然天道猶法於自然人也可不體之哉夫無身之身本來赤子自本自根自古以固存老子曰湛兮似若存吾不知誰之子象帝之先此所謂别體也且夫腦宫圓虛而適眞是以帝君居之故泥丸爲空洞之府也黃庭經云問誰家子在我身此人何去入泥丸正言此爾所以守神者攝動心也守神不失與神爲一則忘其所守之跡矣故曰空洞迹非迹一之精通超乎萬象之表神遊太漠眞空之境則廓然徧體皆虛空也第一委炁立第二順炁生第三成萬法第四主光明列子曰生非我有是天地之委和也察其始也本無我體因委天地父母二炁而立故曰第一委炁立知夫此身乃炁之所生不當暴逆其炁使之夭閼急宜運天炁以歸身使綿綿而不絶胎息歸根順受其炁自然久視故曰第二順炁生夫至人者提挈天地把握陰陽宇宙在乎手萬化生乎身能使形化於炁炁之所以无窮炁化成神神之所以無盡神化合道道合自然以法入道法固易達以道入法法固易成一法苟得則萬法俱成故曰第三成萬法道成則頂負圓象身有光明故曰第四主光明又五經提綱云救苦妙經本於青霄隱書蓋鍊度之祕文也經中綱領有四其要在於主光明而已一曰委炁立蓋元始以一炁分判天地運化陰陽爲萬物之本周子所謂太極動而生陽靜而生陰陽變陰合而生木火金水土者此也二曰順炁生蓋天地旣判陰陽旣立則人受其冲和之氣以生周子所謂二五之精妙合而凝乾道成男坤道成女萬物化生者此也三曰成萬法人道旣立必有聖賢出於其間陳綱紀立制度謂之正德利用厚生而後人道不窮焉子思子所謂修道之謂教亦此意也四曰主光明光明者性體也主云者奉之如君也人能奉此光明常爲一身之主動靜語默皆聽命焉自然靈臺之間軒豁洞達物莫能蔽而道體全矣中庸所謂尊德性大學所謂在明德莊子所謂眞君皆指此也夫此光明人人具有不爲堯存不爲桀亡不爲顔增不爲跖減操之則賢捨之則愚得之則昇天堂失之則沉地獄凡地獄中燒煮屠割苦毒萬狀皆失此光明也天上三十六地下三十六太玄无邊際妙哉大洞經斯言三洞三乘三十六部尊經也元始天尊於龍漢元年出洞眞十二部經演九聖之道太上道君於赤明元年出洞玄十二部經演九眞之道太上老君於上皇元年出洞神十二部經演九仙之道計八千餘篇結飛玄之炁五方紫篆煥於太霄八角垂芒耀於碧落天眞皇人按筆書之三十六部祕於上天紫微金闕无極髙眞與十神五老共相翊衛元始天尊與諸天上聖皆月三朝其靈文未傳下世故曰天上三十六元始復以三十六部祕於龍宫以鎭海嶽洞天故曰地下三十六乃太玄无邊際妙哉大洞經也愚暗臆揣或云陽數四九陰數六六或云七十二候之說殊乖玄旨何昧如斯蓋上乘經典未嘗言於術數歸命太上尊能消一切罪歸神歸命於太上蓋言不可須臾離道也須臾不離於道則神明護之大福隨之動與吉㑹何罪之有東方玉寶皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉晨天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方无量太華天尊上方玉虛明皇天尊下方眞皇洞神天尊道言十方諸天尊其數如沙塵化形十方界普濟度天人十方天尊卽十方靈寶天尊凡有道言二字卽道君所言此經乃靈寶天尊所說卽是萬天之宗師三界之醫王太上大道玉宸君居上清眞境治蘂珠日闕之内化形爲祥光瑞炁流布十方之界普度於天人夫天人者謙恭博施仁德寛容虛恬柔靜相貌爲和愛敬師友聞道篤信此爲有天人之資質天尊則化身下降授以上道濟度成眞故曰普濟度天人若夫根器濁惡不持戒行性躭淫殺聞道大笑者此爲同於失者也非道負人人自負道委炁聚功德列子曰凡炁聚則生炁散則死知炁聚則生人不能禁也知炁散則死人不能止也元炁旣無禁止則是命屬造物而不屬於我也至人得其樞要能掌握呼吸之息息之出入由吾掌握則是我命在我不屬於天俗喭所謂將息者實仙眞流傳點化凡愚之聖語也孰能悟之悟之者自能將其息而使不散則自然委和之炁鍾聚於一息久而積功累德自然成眞故曰委炁聚功德同聲救罪人老子曰同於道者道亦得之若乃勤求師門躭味至理研窮典誥一心念道用志不分者是之謂同聲相應同氣相求始可與言至道而救度之故曰同聲救罪人罪人實可哀我今說妙經夫人受生胞胎之中綿綿十月母呼亦呼母吸亦吸炁足神備解胎而生驚天駭地而得爲人謂之嬰兒嬰兒之心但貴食母之乳餘無所知此乃含眞抱樸之時也旣生百日爲物所誘情見於外俄而能笑則變嬰以爲孩自此乃爲喪道失樸之始也然後十五爲童二十弱冠目眩五色耳惑五音七情奪其性六慾汨其眞純樸蕩而盡矣一日一夜萬死萬生驅役魂神不閉一息此乃處世之人生身受罪於無間地獄湮淪汨没無有出期苟非得道孰能免離若此罪人實可哀也是以天尊大開救苦之門廣闡微妙之典三清聖域坦然可歸念誦無休息歸身不暫停一念在道而不休誦究仙經而不息念誦旣無休息則淵明奥賾契合自然内觀經曰炁來入身謂之生神去離形謂之死是以聖人盜採天炁歸乎一身聖功冲用三返晝夜不欲暫停故曰歸身不暫停天堂享大福地獄無苦聲天仙不離於天神仙不離於神地仙不離於地藥石仙不離於服餌藥石鬼仙不離陰靈之鬼此皆所行之道類使之然亦猶水之就濕火就燥雲從龍風從虎也上學之士凝神鍊炁復命歸根體變純陽身超塵劫至於咀嚼朝霧嚥嗽沆瀣二景纏絡六炁臻身呼吸大梵之雲英妙用悉享於天㕑自然長生歸於天堂矣故曰天堂享大福不食百穀之實土地之精故身不死歸於地而無淪墜之苦故曰無苦聲火翳成清署火翳者南方地獄之名也眾生常爲慾火焚心而色翳目故曰火翳觸目動心地獄卽現旣悟眞詮性天朗徹一念湛然所謂火翳者皆化爲清淨之域也劍樹化爲騫劍樹乃地獄名也眾生競名利爭人我與物相刃相摩交談如矛㦸對面如㓂讎見受劍樹之獄也至人體道含洪光大爲而不爭胷中之荆棘悉化玉樹騫林也上登朱陵府下入開光門此言行火也心爲朱陵府謂之上昧君火閉息宴坐以心引之則無乎不焚腎爲玄冥府謂之中昧臣火昇腰脇腹閉息行之則無乎不達膀胱謂之三昧民火提動機關金龜吐燄則無乎不昇鍊上屍則火炁騰陟於絳宫故曰上登朱陵府焚下屍則火炁透徹尾閭故曰下入開光門超度三界難世之人頭頂欲天足履欲地身處欲界輪轉於六欲業輪之中無有休息者不忘於欲也能常無欲則三界輪迴之難頓超之矣徑上元始天元始天卽玉清聖境也上道旣成神昇玉清位爲眞人出則諸天侍軒萬神備衞髙出乎太清上清之眞也於是飛天眞人无鞅數眾瞻仰尊顔而作頌曰人之頂骨八片謂之八天亦曰八門中有金樓寶殿玉闕紫房自已無相眞人總領萬神居之道成則神光内燭天門自開嬰兒蛻質於是眞人飛從天門而出故曰飛天眞人身中之千眞萬靈卽无鞅數眾也度人經曰上開八門飛天法輪生神章云慶此嬰兒蛻正此謂也神昇玄都上朝虛皇故曰瞻仰尊顔而作謡歌頌詠大聖之德也天尊說經教引接於浮生天職覆地職載聖職教化天尊所以廣敷經教接引浮世眾生者乃聖人之職也勤修學無爲無爲爲之之謂道無爲言之之爲德天無爲以清地無爲以寧二無爲相合而萬物生人安得無爲哉故曰恬淡寂寞虛無無爲此天地之平而道德之質也勤修上士絶學髙人能依無爲是配合天地之平凖符契道德之質實不亦大哉悟眞道自成悟其眞者始覺萬緣俱假惟道是眞抱守其眞自然成道不迷亦不荒世人迷於名利情欲荒於聲色滋味迷之又迷以至於荒荒者言其神不明而心靈逐物蕩蕩逝去而不返也老子曰荒兮其未央哉决以言其未嘗守中也夫至人履乎平易踐乎恬愉澹然獨與神明俱視天下皆爲塵勞妄幻風燈聚沬露電泡影旣不堅久無足傾戀入乎泰定眞常之域一念不生萬緣俱息至此境界何荒迷之有哉無我亦無名不尙賢能外其身而虗已以逝世故曰無我道常無名是以聖人韜其光而隱其身者恐其道未成而名勝於實也名者實之賓虛名出而道德備矣故曰繩繩兮不可名莊子云神人無功至人無已聖人無名也朗詠罪福句揚教化也萬徧心垢清精研聖典靈府虛明於是飛天神王及諸仙眾說是頌畢稽首天尊奉辭而退飛天神王乃我本來之帝眞也夫神通變化總而爲一不爲不足化而爲萬不爲有餘及諸仙眾則自已之萬神也稽首天尊永遵依大道也奉辭而退復歸於无極也
