body:
  text: 道神庵洞陽子注解太上太者至大之稱上者尊崇之號以其始乎太初太易之上故曰太上夫太易者未見氣也元始之初氣未之見也太易變而為太初太初者氣之始也先天元氣始見微芒太初變而為太始太始者形之始也漸有元氣之形矣太始變而為太素太素者質之始也元氣之形質具矣太素變而為太極太極者混沌也溟𣸉鴻濛狀如雞子其中有精彌綸無外元氣凝而清濁未分也太極既變則混沌開而鴻濛裂於是清陽之氣升而為天濁陰之氣降而為地易曰太極生兩儀是也兩儀生三才即非濁非清中和之氣結而成人倫也是謂道生一一氣之混沌也一生二二儀之清濁也二生三三才之人倫也然後三生萬物萬物始之於天也天地不能自有有天地者太極也太極不能自生生太極者太素也太素不能自育育太素者太始也太始不能自孕孕太始者太初也未有太初先有太易夫太上者謂始乎太初太易之上是無大之大故曰太髙出乎八極之表故曰上也又太者甚也上者髙也言是經妙義甚髙則無以過矣昔者聖人製此太字其文從人從一從一點者蓋人得一謂之大大人能卓然獨存常正此一點者可與太上全體也此一點亘古亘今不生不滅在道則謂之無神在儒則謂之真性在釋則謂之本來在眼能視在耳能聽在鼻能嗅在舌能嘗在乎能執持在是能步履以致語默動靜千轉萬變未嘗不因此一點而通靈也是以老君之鍊養養此一點而已莊周之寓言言此一點而已周公之仰思思此一點而已孔子之潜心潜此一點而已如來之大覺覺此一點而已祖師之相傳傳此一點而已百姓日用而不知外為聲色所蕩內為嗜欲所汩畫隨情愛夜逐夢飛念想攀緣未嘗暫息此一點不正心影常偏為情欲誘之使出於外故成大字以言乎流浪輪轉或為畜類也夫上字之文從卜從一卜度也一性也卜爾之一性能謙遜居下者則為上士矣江海以下百谷則為百谷王小國以下大國則取大國此孔子所以下漁父也夫下人不精不得其真井雖千仞汲之水上是以聖人不降則不升故曰貴以賤為本高以下為基是知未嘗先人而常隨人後其身而身先者謙尊而光此真人應世之道也故曰卜爾之一居下則為上士其理昭然卜爾之一性若乃日矜自伐自是自彰而好居人上者斯則下人矣若夫體合太虛廓然無我所為一點者內外俱忘上下雙遣斯則至聖之道可謂自巳三清何勞仰望自己太上何勞外求也洞玄洞者通也上通於天下通於地中有神仙幽相往來天下十大洞三十六小洞居乎太虛磅礴之中莫不洞洞相通惟仙聖聚則成形散則為氣自然往來虛通而無窒礙是以聖人遠取諸物近取諸身則人一身之中亦有洞者頭有九宫上有寥天共為十大洞天柱骨二十四節共十二重樓共三十六洞上通泥丸之九天下徹尾閭之九地中有真氣幽相往來是以聖人於虛極靜篤之中斡轉璇璣神通氣洞上與天通所謂三宫升降上下往來無窮者也且洞之一字從水從同即是洞與水同也夫巨海之水八紘九野天漢之流酌焉而不竭注焉而不滿渺渺漫漫無垠無際不可得而測其淵深也故造道者皆自粗至細自細至微微極而後至於妙妙極而後至於玄道之玄則無乎不通矣故洞也者以其幽深而不可測也玄也者以其微妙而不可窮也言是奧旨逺邈深如洞玄非玉虛之夙挺其孰能通之哉靈寶天尊說救苦妙經靈寶天尊即太上道君也以身言之靈者神也寶者氣也形者靈寶之宅舍也夫人有耳目乃元神之門晝則心寤神遊於耳夜而目寐則神歸絳宫衆人視聽於外則神遊於外見聞聲色動蕩乎中神性化而為情情受牽纏故心有念動有著晝有想夜有夢薾然馳逐馳逐於無涯之欲百靈疲役而消散宅舍無寶而崩頽此皆用神於外而不能守之於內者也若夫至人萬法俱忘惟神是守目內視而神光煥於玉闕耳返聽而妙韻響於瓊房神字泰定一念不生智恬交養久而道靈上際於天下蟠於地六通四闢妙用無窮造化莫移陰陽莫測故能駕景乘飈登真合道莫不由於神性者也得不謂之靈乎夫人有鼻口乃命寶出入之戶息息通於天地元氣之所往來凡一呼則榖氣出一吸則元氣入不死之機長生之要實隱於此矣衆人心靈外馳情躁氣促息之以喉胎元蕩散真氣凋零氣竭命終可不惜哉惟至人深達造化之源呼吸太和之氣奪本還元歸根復命息之以踵寶莫寶於氣逹斯理者泥丸玉闕所以棲其神玄門牝户所以襲其氣氣以制神神以攝氣母子相守性命混融然後萬神不散故能靈一氣凝結則成寶是謂一身之靈寶也夫衆生之苦莫大於輪回生死天尊大慈演說洞妙開滯塞之門指光明之路解悟之者得脫生死永免輪回故曰救苦也經者徑也常也欲今上學之人依此徑路常行之也爾時救苦天尊天尊則元氣是也法身無相積氣成真為天中之尊聚則成形散復為氣遍滿十方界元氣大無不包細無不入在谷滿谷在坑滿坑彌滿八極無往不在故曰遍滿十方界常以威神力救拔諸衆生夫威神力莫大於元氣元氣之運獨乘造化之權衆生者所謂胎卵濕化之四生至於花卉草木禽獸魚𪔀蠕飛蠢動有情無情皆舍育元氣而生故元氣在則柔弱滋養而生元氣去則堅強枯槁而死老子曰柔弱者生之徒堅强者死之徒凡有貌象聲色者皆物也悉得元氣而後生故曰救拔諸衆生得離於速途衆生不知覺如盲見日月衆生耽染聲色嗜欲困於迷途之中殊不知魚在水中水在魚中人在氣中氣在人中魚失水死人失氣亡吞舟之魚碭而失水則蟻能苦之故曰魚不可脫於淵人不可離於氣魚能吐納而化水則不死人能吐納而化氣則長生舉世但知日食榖肉果菜以養命而不知榖肉果菜乃戮形之物也夫有故以其有形者屬於陰乃土地之精也惟元氣乃屬陽且人一呼則氣出二寸一吸則氣入三寸一呼一吸為一息一日一夜一萬三千五百息真氣計八百一十丈升降於鼻口呼吸之間凡夫不能掌握皆歸空而散則一息不返人命卒矣此經有養氣留神不死之訣世愚不達其旨譬如盲者雖有日月之大明莫能見之故曰如盲見日月我本太無中拔領無邊際元氣在太空虛無之中其猶橐籥吸張不息以其無有能入於無間故曰有而無形無而有精失之則死得之則生亘古通今得道升仙者莫計其數皆得冲氣以為用始成真故曰拔領無邊際慶雲開生門祥煙塞死戶一經之眼目救苦之樞機在於此也慶雲祥煙乃太和妙氣之異名生門死戶乃玄門牝戶之列號或曰天門地戶或曰乾坤門戶凡言門戶者必有物從兹而出入也開者闢也闔者塞也易曰闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通天地所以能長且久者以此也人欲長生久視與天地齊其年當於生門死戶之中窮道塞之端究造化之妙使通天地陰陽二氣往來升降之不窮謂之出日入月亦曰出清入玄也不遇至人所指非碩學之所能聞以其性須自悟命假師傳也僕曩承師旨决以淵微輒將太上不泄真機顯露聖訣學者宜精究之訣曰生門死戶兮千般異呼一曰朱淵兮一曰神廬下士不達兮鼻吸口吐上仙樞要兮萬類莫如慶雲祥煙兮既升且降開通充塞號雲英紫腴採集素英兮飛空之景氣來入身兮味勝醍醐像龜引息兮通靈不死效蚌吸月兮涵養結珠天機斯泄兮遇者祕密功成輕舉兮駕馭瓊與初發玄元始以通祥感機大道始初發生乎一氣一氣初為玄元始三氣故曰初發玄元始三氣結而為三清三色混沌煥爛太空三氣復各生三氣疊三成九即成九霄而為九天也生神章云須延總三靈玄元始氣分黃庭經所謂三氣右回九道明又曰九氣映明出霄間即是三氣為天地之尊九氣為萬物之根人能採鍊玄元始三素之氣通感祥煙慶雲之際是謂得造化之樞機故言以道祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精一切罪莫大於死罪一切厄莫大於死厄人死雖有萬殊總歸三路聖人死之曰神賢人死之曰復衆人死之曰物何謂聖人死之曰神聖人養聖胎於神室身內生身陽神脫質死而不亡脫胎神化者謂之神仙也何謂賢人死之曰復賢人在世不與物交性無所著以生為寄以死為歸歸者復也精神入其門骨骸返其根我尚何存藎能虛諸所有而神識靈明出乎物外輪回不入陰官莫拘翛然自在雖南面王樂亦不及也明心達性賢人君子禪伯之流超證真常永無係纍稍或見地未明修為有缺著於談空滯於觀想終則謂之隂靈苦爽鬼仙是也或欲出世則能奪舍授胎何謂衆人死之曰物衆人在世魂夢念想常與物交不能外物安出物外故命將絶時形神不能相離如生龜脫殼螃蟹入湯疼痛苦楚萬狀千般既死之後境界黑暗猶如夜半之禽飛懵然安投不知所歸何地在造物之陶鑄隨業識以受生或化異類而不自覺蓋心之所化而不得不化也亦猶至暴者化為猛虎至淫者化為婦人或為傍生六畜禽蟲之類及再得為人皆謂之物也故曰衆人死之曰物若人臨終之時諸處俱冷惟頂門尚自溫暖者此人得道徑歸淨域諸處俱冷心頭尚溫再得為人身不慕修道惶惶汲汲奔逐利名沉滯聲色日復一日如牽牛羊赴於屠肆步行一步去死轉近未死之前可不速求至道勤而行之成真度世求免生死之罪厄故曰救一切罪度一切厄道成則名刋金籙位列仙卿玉女麾幢仙童鼓節逍遙上清上上渺渺大羅之鄉諸天梵氣蕩蕩至清故曰渺渺超仙源蕩蕩自然清佩符則千魔喪膽流金則萬精滅形故曰皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙空彼萬法而妙用在中故曰空中內景煥爛返視獨見故曰何灼灼泥丸在兩眉間直入三寸為腦血之瓊房魂精之玉室百靈之命宅津液之山源一名上一赤子乃形軀之上神故曰泥丸仙紫雲覆黃老金木之氣青白交會則化碧霞水火之氣黑赤既濟則化紫雲夫受鍊形質莫先於真水真火也真水非涕唾津液谷氣所以化之濁水在乎採太和妙氣之中自有真一之水謂之玄泉要當明其水源之清濁也火本無形因物而生用無法則禍發必克仙家行火亦有數等用之則滅尸鍊𩲸體變純陽則有符數契合周天日月之躔度皆口口相傳難書竹帛仙彥有之曰神仙祕易不祕難聖人傳藥不傳火夫行水不行火則氣難上騰行火不行水則不能薰蒸是以水火既濟而氤氳氣乃化為紫雲神聚處氣必朝之故紫雲蓊鬱上朝於泥丸覆蓋於中央黃老君故曰紫雲覆黃老是名三寶君三寶君者因神氣精凝化而有也神有陰陽氣有清濁精有逆順何謂神有陰陽若因存思念想而後通靈者亦能出入天門預知未然謂之陰神也若夫積陰陽之氣結而成祥身內生身胎仙舞蛻者是謂陽神也陽神為仙陰神為鬼也何謂氣有清濁天有形質含血氣者榖肉果萊之類滋地根而生長其字從無從火是謂谷氣亦名地氣故曰濁也夫太和妙氣生天生地神鬼神帝強名為道即氣也氣即道也視之不見聽之不聞摶之不得無形之形無物之象透金貫石充塞八荒其字從死從火火陽也乃虛無之中清陽之氣也積陰氣者則死服陽氣者則生何謂精有逆順順則成人逆為丹母斯皆行火而有升降也凡夫婦之接名為劫火亦通三關而透尾閭故順出則成人若乃提縮金龜是謂文火閉息而行是謂武火契合日月謂之符火故仙人道士開金鎖徹玉關運璇璣斡日月金精貫頂銀浪衝天是謂泝流故回逆為丹母也順則形斃逆則骨堅也夫人有眼目者乃神之門鼻口者氣之戶尾閭者精之路神微妙用天真聖功盡隱於此矣於是至人內視返聽凝其神呼吸太和襲其氣逆運流珠聚其精三寶凝積於神室之內皆化為神故曰是名三寶君還將上天氣以制九天魂人頭有九天亦曰天谷魂神居之黃庭所謂上有魂靈下關元是也形好食味神好食氣天氣乃陽神之飯食也生神章云魂生攝遊氣飄飄鍊素華夫信遊氣者乃上天氣也魂神所攝者蓋好食氣而故以上天之氣制於九天魂也神不得一氣以制之則不能靈谷不得一氣以充之則不能盈神無以靈而將恐歇而神去於身矣谷無以盈將恐謁而天谷空虛矣谷神既逝則人命終矣昔之未遇元氣蕩蕩而去今既明真去而有所復來故曰大還也還將上天之氣以制九天魂神始得其谷神不死故謂神得一而靈谷得一而盈救苦諸妙神善見救苦時天上混無分夫修上道要在全神神全之士光而不耀蒙以養正故能復太朴抱虛恬混成獨立一性遊乎寂寞靜極之境不萌纎芥之知故其神不離不起毫釐之念故其神不散蒙莊曰其天守全其神不卻守其天者神光纒綿化生萬神故曰諸妙神也凡言救苦者自救之也苦不自救孰能救之我道將成則大浸稽天而不溺大畢山焦而不熱死生無變於己而况大數大劫之死乎超越厄難之外故曰善見救苦時也所謂回風混合帝一之道一混百神於自己天上而不可分故曰天上混無分天氣歸一身皆成自然人夫天氣者起於太易之先超乎萬象之外應清明以出入佇神機以卷舒澄清碧於髙天淡輕紅於落日不干風兩不犯塵埃呼吸玄牝之門澡雪希夷之域止飢竭除滓穢去三尸消百病此乃清虛有道之氣也玉皇神用祕訣曰知至道者天不殺服元氣者地不滅能明吐納之理即使日霞日精月華月英三素五芽元皇正氣來合我身此皆天氣也太和入體則骨肉輕清項生圓象隱顯自然始能為自然人也故曰天氣歸一身皆成自然人如起於不潔之地因於燥濕之處雜腥穢之飲饌混尸冢之蒸鬱斯乃濁惡沉滯之死氣仙道忌焉所以仙人多樓居者以其近天氣也黃庭經云至忌死氣諸穢賤自然有别體本在空洞中空洞迹非迹遍體皆虛空老子曰天法道道法自然天道猶法於自然人也可不體之哉夫無身之身本來赤子自本自根自古以固存老子曰湛兮似若存吾不知誰之子象帝之先此所謂别體也且夫腦宫圓虛而適真是以帝君居之故泥丸為空洞之府也黃庭經云問誰家子在我身此人何去入泥丸正言此爾所以守神者攝動心也守神不失與神為一則忘其所守之跡矣故曰空洞迹非迹一之精通超乎萬象之表神遊太漠真空之境則廓然遍體皆虛空也第一委氣立第二順氣生第三成萬法第四主光明列子曰生非我有是天地之委和也察其始也本無我體因委天地父毋二氣而立故曰第一委氣立知夫此身乃氣之所生不當暴逆其氣使之夭閼急宜運天氣以歸身使綿綿而不絶胎息歸根順受其氣自然久視故曰第二順氣生夫至人者提挈天地把握陰陽宇宙在乎乎萬化生乎身能使形化於氣所以無窮氣化成神神之所以無盡神化合道道合自然以法入道法固易達以道入法法固易成一法茍得則萬法俱成故曰第三成萬法道成則頂負圓象身有光明故曰第四主光明又五經提綱云救苦妙經本於青霄隱書蓋鍊度之祕文也經中綱領有四其要在於主光明而巳一曰委氣立蓋元始以一氣分判天地運化陰陽為萬物之本周子所謂太極動而生陽靜而生陰陽變陰合而生木火金水土者此也二曰順氣生蓋天地既判陰陽既立則人受其冲和之氣以生周子所謂二五之精妙合而凝乾道成男坤道成女萬物化生者此也三曰成萬法人道既立必有聖賢出於其間陳綱紀立制度謂之正德利用厚生而後人道不窮焉子思子所謂修道之謂教亦此意也四曰主光明光明者性體也主云者奉之如君也人能奉此光明常為一身之主動靜語默皆聽命焉自然靈臺之間軒豁洞達物莫能蔽而道禮全矣中庸所謂尊德性大學所謂在明德莊子所謂真君皆指此也夫此光明人人具有不為堯存不為桀亡不為顏增不為跖滅操之則賢捨之則愚得之則升天堂失之則沉地獄凡地獄中燒煮屠割苦毒萬狀皆失此光明也天上三十六地下三十六太玄無邊際妙哉大洞經斯言三洞三乘三十六部尊經也元始天尊於龍漢元年出洞真十二部經演九聖之道太上道君於赤明元年出洞玄十二部經演九真之道太上老君於上皇元年出洞神十二部經演九仙之道計八千餘篇結飛玄之氣五方紫篆煥於太霄八角垂芒耀於碧落天真皇人桉筆書之三十六部祕於上天紫微金闕無極髙真與十神五老共相翊衛元始天尊與諸天上聖皆月三朝其靈文未傳下世故曰天上三十六元始復以三十六部祕於龍宫以鎮海嶽洞天故曰地下三十六乃太玄無邊際妙哉大洞經也愚暗臆揣或云陽數四九陰數六六或云七十二候之說殊乖玄旨何昧如斯蓋上乘經典未嘗言於術數歸命太上尊能消一切罪歸神歸命於太上蓋言不可須臾離道也須臾不離於道則神明護之大福隨之動與吉㑹何罪之有東方王寶皇上天尊南方玄真萬福天尊西方太妙至極天尊北方玄上玉晨天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方真皇洞神天尊道言十方諸天尊其數如沙塵化形十方界普濟度天人十方天尊即十方靈寶天尊凡有道言二字即道君所言此經乃靈寶天尊所說即是萬天之宋師三界之醫王太上大道玉宸君居上清真境治蘂珠日闕之內化形為祥光瑞氣流布十方之界普度於天人夫天人者謙恭博施仁德寬容虛恬柔靜相貌為和愛敬師友聞道篤信此為有天人之資質天尊則化身下降授以上道濟度成真故曰普濟度天人若夫根器濁惡不持戒行性耽謡殺聞道大笑者此為同於失者也非道負人人自負道委氣聚功德列子曰凡氣聚則生氣散則死知氣聚則生人不能禁也知氣散則死人不能止也元氣既無禁止則是命屬造物而不屬於我也至人得其樞要能掌握呼吸之息息之出入由吾掌握則是我命在我不屬於天俗唁所謂將息者實仙真流傳點化凡愚之聖語也孰能悟之悟之者自能將其息而使不散則自然委和之氣鍾聚於一息久而積功纍德自然成真故曰委氣聚功德同聲救罪人老子曰同於道者道亦得之若乃勤求師門耽味至理研窮典誥一心念道用志不分者是之謂同聲相應同氣相求始可與言至道而救度之故曰同聲救罪人罪人實可哀我今說妙經夫人受生胞胎之中綿綿十月母呼亦呼母吸亦吸氣足神備解胎而生驚天駭地而得為人謂之嬰兒嬰兒之心但貴食毋之乳餘無所知此乃含真抱朴之時也既生百日為物所誘情見於外俄而能笑則變嬰以為孩自此乃為喪道失朴之始也然後十五為童二十弱冠目眩五色耳惑五音七情奪其性六欲汩其真純朴蕩而盡矣一日一夜萬死萬生驅役魂神不閉一息此乃處世之人生身受罪於無間地獄湮淪汩沒無有出期苟非得道孰能免離若此罪人實可哀也是以天尊大開救苦之門廣闡微妙之典三清聖域坦然可歸念誦無休息歸身不暫停一念在道而不休誦究仙經而不息念誦既無休息則淵明奧賾契合自然內觀經曰氣來入身謂之生神去離形謂之死是以聖人盜採天氣歸乎一身聖功冲用三返晝夜不欲暫停故曰歸身不暫停天堂享大福地獄無苦聲天仙不離於天神仙不離於神地仙不離於地藥石仙不離於服餌藥石鬼仙不離陰靈之鬼此皆所行之道類使之然亦猶水之就濕火就燥雲從龍風從虎也上學之士凝神鍊氣復命歸根體變純陽身超塵劫至於咀嚼朝霧咽嗽沆瀣二景纏絡六氣臻身呼吸大梵之雲英妙用悉享於天廚自然長生歸於天堂矣故曰天堂享大福不食百榖之實土地之精故身不死歸於地而無淪墜之苦故曰無苦聲火翳成清署火翳者南方地獄之名也衆生常為欲火焚心而色翳目故曰火翳觸目動心地獄即現既悟真詮性天朗徹一念湛然所謂火翳者皆化為清淨之域也劎樹化為騫劎樹乃地獄名也衆生競名利爭人我與物相刃相摩交談如矛戟對面如寇雦見受劒樹之獄也至人體道含洪光大為而不爭留中之荆棘悉化玉樹騫林也上登朱陵府下入開光門此言行火也心為朱陵府謂之上昧君火閉息宴坐以心引之則無乎不焚腎為玄冥府謂之中昧臣火升腰脅腹閉息行之則無乎不達膀胱謂之三昧民火提動機關金龜吐焰則無乎不升鍊上尸則火氣騰陟於絳宫故曰上登朱陵府焚下尸則火氣透徹尾閭故曰下入開光門超度三界難世之人頭頂欲天足履欲地身處欲界輪轉於六欲業輪之中無有休息者不忘於欲也能常無欲則二界輪回之難頓超之矣徑上元始天元始天即玉清聖境也上道既成神升玉清位為真人出則諸天侍軒萬神備衛髙出乎太清上清之真也於是飛天真人無鞅數衆瞻仰尊顏而作頌曰人之頂骨八片謂之八天亦曰八門中有金樓寶殿玊闕紫房自已無相真人總領萬神居之道成則神光內燭天門自開嬰兒蛻質於是真人飛從天門而出故曰飛天真人身中之千真萬靈即無鞅數衆也度人經曰上開八門飛天法輪生神章云慶此嬰兒蛻正此謂也神升玄都上朝虛皇故曰瞻仰尊顏而作謡歌頌詠大聖之德也天尊說經教引接於浮生天職覆地職載聖職教化天尊所以廣敷經教接引浮世衆生者乃聖人之職也勤修學無為無為為之之謂道無為言之之為德天無為以清地無為以寧二無為相合而萬物生人安得無為哉故曰恬淡寂寞虛無無為此天地之平而道德之質也勤修上士絶學髙人能依無為是配合天地之平凖符契道德之質實不亦大哉悟真道自成悟其真者始覺萬緣俱假惟道是真抱守其真自然成道不迷亦不荒世人迷於名利情欲荒於聲色滋味迷之又迷以至於荒荒者言其神不明而心靈逐物蕩蕩逝去而不返也老子曰荒兮其未央哉决以言其未嘗守中也夫至人履乎平易踐乎恬愈淡然獨與神明俱視天下皆為塵勞妄幻風燈聚沫露電泡影既不堅久無足傾戀入乎秦定真常之域一念不生萬緣俱息至此境界何荒迷之有哉無我亦無名不尚賢能外其身而虛己以逝世故曰無我道常無名是以聖人韜其光而隱其身者恐其道未成而名勝於實也名者實之賓虛名出而道德備矣故曰繩繩兮不可名莊子云神人無功至人無巳聖人無名也朗詠罪福句揚教化也萬遍心垢清精研聖典靈府虛明於是飛天神王及諸仙衆說是頌畢稽首天尊奉辭而退飛天神王乃我本來之帝真也夫神通變化衆而為一不為不是化而為萬不為有餘及諸仙衆則自巳之萬神也稽首天尊永遵依大道也奉辭而退復歸於無極也太上洞玄靈寶天尊說救苦妙經注解
