front:
  text: 太上洞玄靈寶救苦妙經序推四夫學長生久視之道在乎鍊氣養神兼施並行然鍊養之功本乎一心心能勤修則學仙何患乎不得真誥曰仙者心學奧哉斯旨也僕夙慕修真未逢上士有果能明生死達性命者僕將跪履而問焉比遊武夷西湖與四明吕君邂逅一見歡然遂定交為煙蘿友因俱載以歸館于靜舍吕君號洞陽子蚤遇至人刻意莊老之學慱極仙書問靡不知一日謂愚曰世有所謂救苦經者實大洞之密旨上道之祕言也以其隱奧玄微難窮妙理所以傳自往古而詮注未彰思欲殫所藴發揮其義未幾書成淹淹萬言首明一點指慶雲祥煙為泰和辨生門死户為玄牝分二氣之清濁判三昧之火符以泥丸仙明真性之所歸還上天氣為命寶之所集總談上道之樞要粲然包括其中不惟警未聞裨後學而已抑亦使人洞明修鍊默識天機豈架空言衒虛文之比哉噫此經之妙道至言晦久而未明命日顯矣夫天中之尊演教法弘濟所謂救苦者非獨為幽魂苦爽而設其所救者普天之下生靈耳蓋欲使人人體道咸離迷途湛壺天之朗徹悟真性之無為然後服天氣盜虛無結聖胎通神明使形與神妙白日飛升是謂大丈夫越世表出三界輪回之難始名真救苦耳大矣哉超死度生無出是經有遇斯解留神不捨者必見其得道矣錦江葆真子周凖謹序太上洞玄靈寶天尊說救苦妙經注解
